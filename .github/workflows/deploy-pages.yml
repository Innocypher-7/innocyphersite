name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  # Run manually from the Actions tab (useful after merge or to redeploy without a new commit)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      # Use relative asset URLs (PUBLIC_URL=.) unless vars.PUBLIC_URL overrides, so the same build
      # works at https://innocypher.com and at https://<org>.github.io/<repo>/ (no cross-origin manifest/CSS).
      - name: Resolve PUBLIC_URL
        id: public_url
        env:
          CUSTOM_PUBLIC_URL: ${{ vars.PUBLIC_URL }}
        run: |
          set -e
          if [ -n "$CUSTOM_PUBLIC_URL" ]; then
            u="$CUSTOM_PUBLIC_URL"
            if [[ "$u" == http://* ]]; then
              u="https://${u#http://}"
            fi
            echo "value=$u" >> "$GITHUB_OUTPUT"
          else
            echo "value=." >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          PUBLIC_URL: ${{ steps.public_url.outputs.value }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
