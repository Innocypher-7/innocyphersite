name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm test -- --watchAll=false
        env:
          CI: true

      - name: Resolve PUBLIC_URL
        id: public_url
        env:
          CUSTOM_PUBLIC_URL: ${{ vars.PUBLIC_URL }}
        run: |
          set -e
          if [ -n "$CUSTOM_PUBLIC_URL" ]; then
            u="$CUSTOM_PUBLIC_URL"
            if [[ "$u" == http://* ]]; then
              u="https://${u#http://}"
            fi
            echo "value=$u" >> "$GITHUB_OUTPUT"
          else
            echo "value=." >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          PUBLIC_URL: ${{ steps.public_url.outputs.value }}
        run: npm run build
